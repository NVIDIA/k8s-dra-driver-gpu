{{- if .Values.kubeletPlugin.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dra-driver-nvidia-gpu.name" . }}-kubelet-plugin
  namespace: {{ include "dra-driver-nvidia-gpu.namespace" . }}
  labels:
    {{- include "dra-driver-nvidia-gpu.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "dra-driver-nvidia-gpu.selectorLabels" (dict "context" . "componentName" "kubelet-plugin") | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress: []
  egress:
  # Some CNIs are not capable of controlling access to host network resources nor plain IP addresses,
  # as they are identity based and these resources are not being covered this way.
  #
  # Therefore, we cannot filter egress traffic by destination using native network policies and pod selectors.
  - ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 6443
  # Allow DNS resolution to kube-dns.
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
{{- end }}
