# One pod, one container using GPU with MPS sharing strategy via ResourceClaimTemplate
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: rct-mps-gpu
  labels:
    env: batssuite
spec:
  spec:
    devices:
      requests:
      - name: mps-gpu
        exactly:
          deviceClassName: gpu.nvidia.com
      config:
      - requests: ["mps-gpu"]
        opaque:
          driver: gpu.nvidia.com
          parameters:
            apiVersion: resource.nvidia.com/v1beta1
            kind: GpuConfig
            sharing:
              strategy: MPS
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-mps-gpu
  labels:
    env: batssuite
spec:
  restartPolicy: Never
  containers:
  - name: ctr
    image: ubuntu:24.04
    command: ["bash", "-c"]
    args: ["trap 'exit 0' TERM; sleep 9999 & wait"]
    resources:
      claims:
      - name: mps-gpu
  resourceClaims:
  - name: mps-gpu
    resourceClaimTemplateName: rct-mps-gpu
